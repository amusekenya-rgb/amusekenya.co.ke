        <h1 style="font-size:2em;color:#2D5016;">Amuse Kenya — Kids Outdoor Camps &amp; Holiday Programs in Nairobi</h1>
        <p style="font-size:1.2em;">Forest adventures and outdoor education for children aged 3-17 at Karura Forest, Nairobi. We build character and confidence through nature exploration, team games, survival skills, and creative play.</p>

          </div>

          </div>

          </div>

        <!-- FAQ Section -->
        <h2 style="color:#2D5016;border-bottom:1px solid #ddd;padding-bottom:8px;">Frequently Asked Questions</h2>
        <dl>
          <dt style="font-weight:bold;margin-top:16px;">What ages are Amuse Kenya programs for?</dt>
          <dd>Our programs cater to children aged 3 to 17 years, with age-appropriate activities for toddlers (3-5), juniors (6-9), pre-teens (10-12), and teens (13-17).</dd>
          
          <dt style="font-weight:bold;margin-top:16px;">Where is Amuse Kenya located?</dt>
          <dd>We are based at Karura Forest in Nairobi, Kenya. Our main entry point is Gate F on Sigiria/Thigiri Ridge. We also run programs at other locations across Kenya.</dd>
          
          <dt style="font-weight:bold;margin-top:16px;">What outdoor activities for kids are available in Nairobi?</dt>
          <dd>We offer nature walks, forest exploration, survival skills, team games, arts and crafts, wildlife observation, horse riding, archery, tree climbing, rope courses, orienteering, and more.</dd>
          
          <dt style="font-weight:bold;margin-top:16px;">How much do Amuse Kenya programs cost?</dt>
          <dd>Pricing varies by program and duration. Day camps start from KES 2,500 per child. Contact us for specific program pricing and group discounts.</dd>
          
          <dt style="font-weight:bold;margin-top:16px;">How do I register my child?</dt>
          <dd>Register online through our website, call us at 0114 705 763, email info@amusekenya.co.ke, or reach us on WhatsApp.</dd>
        </dl>
